<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTrain Shoutouts</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;padding:1.25rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
  .card{border-radius:16px;padding:1.25rem;}
  .card-cv  {background:#EEEDFE;}
  .card-goal{background:#E1F5EE;}
  .card-cps {background:#FAEEDA;}
  .card-imp {background:#FBEAF0;}
  .medal{font-size:30px;line-height:1;margin-bottom:8px;}
  .winner-name{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:2px;}
  .cv-n  {color:#26215C;} .goal-n{color:#04342C;} .cps-n{color:#412402;} .imp-n{color:#4B1528;}
  .winner-stat{font-size:13px;margin-bottom:12px;font-weight:600;}
  .cv-s  {color:#534AB7;} .goal-s{color:#0F6E56;} .cps-s{color:#854F0B;} .imp-s{color:#993556;}
  .divider{height:0.5px;margin-bottom:10px;}
  .cv-d  {background:#AFA9EC;} .goal-d{background:#5DCAA5;} .cps-d{background:#EF9F27;} .imp-d{background:#ED93B1;}
  .runner{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .runner:last-child{margin-bottom:0;}
  .r-rank{font-size:12px;width:14px;flex-shrink:0;}
  .cv-rn {color:#7F77DD;} .goal-rn{color:#1D9E75;} .cps-rn{color:#BA7517;} .imp-rn{color:#D4537E;}
  .r-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
  .cv-av {background:#CECBF6;color:#3C3489;}
  .goal-av{background:#9FE1CB;color:#085041;}
  .cps-av {background:#FAC775;color:#633806;}
  .imp-av {background:#F4C0D1;color:#72243E;}
  .r-info{flex:1;}
  .r-top{display:flex;align-items:center;justify-content:space-between;}
  .r-name{font-size:13px;}
  .cv-rname {color:#3C3489;} .goal-rname{color:#085041;} .cps-rname{color:#633806;} .imp-rname{color:#72243E;}
  .r-stat{font-size:12px;}
  .cv-rs {color:#534AB7;} .goal-rs{color:#0F6E56;} .cps-rs{color:#854F0B;} .imp-rs{color:#993556;}
  .bar-bg{height:4px;border-radius:2px;overflow:hidden;margin-top:3px;}
  .cv-bb {background:#CECBF6;} .goal-bb{background:#9FE1CB;} .cps-bb{background:#FAC775;} .imp-bb{background:#F4C0D1;}
  .bar-fill{height:100%;border-radius:2px;}
  .cv-bf {background:#7F77DD;} .goal-bf{background:#1D9E75;} .cps-bf{background:#EF9F27;} .imp-bf{background:#D4537E;}
  .goal-sub{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;color:#0F6E56;margin-top:10px;}
  .goal-sub:first-child{margin-top:0;}
  .loading{text-align:center;padding:3rem;color:#aaa;font-size:14px;}
  .error{padding:1rem;font-size:13px;color:#A32D2D;background:#FCEBEB;border-radius:12px;line-height:1.8;}
  .refresh-btn{display:block;width:100%;margin-top:14px;padding:10px;background:transparent;border:1px solid #eee;border-radius:10px;font-size:13px;color:#aaa;cursor:pointer;}
  .refresh-btn:hover{background:#f9f9f9;}
</style>
</head>
<body>

<div id="content"><div class="loading">Loading standings...</div></div>
<button class="refresh-btn" onclick="load()">↻ &nbsp;Refresh</button>

<script>
const SHEET_ID = "2PACX-1vQgufsGrprHU32Xa3vaIFx3kC7fDF-pEt9B_i2S8OUbtJrvS34gyvD-FLC9NH3aAAptPeczynY7MBrJ";
const GID_NOW  = "2090932640";
const GID_PREV = "1948129235";

function csvURL(gid){
  return `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=${gid}&single=true&output=csv`;
}

function ini(n){return(n||"?").trim().split(/\s+/).map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function num(v){return parseFloat((v||"").replace(/[^0-9.\-]/g,""))||0;}
function pct(v){
  const s=(v||"").trim();
  const f=parseFloat(s.replace(/[^0-9.\-]/g,""))||0;
  return s.includes("%")?f:(f>1?f:f*100);
}

function parseCSV(text){
  return text.trim().split("\n").map(line=>{
    const out=[];let cur="",q=false;
    for(const ch of line){
      if(ch==='"')q=!q;
      else if(ch===','&&!q){out.push(cur.trim());cur="";}
      else cur+=ch;
    }
    out.push(cur.trim());
    return out;
  });
}

function parseSheet(text){
  const rows=parseCSV(text);
  let hr=-1;
  for(let i=0;i<Math.min(12,rows.length);i++){
    const j=rows[i].join(" ").toLowerCase();
    if((j.includes("rep")||j.includes("agent"))&&(j.includes("nominal")||j.includes("approved"))){hr=i;break;}
  }
  if(hr<0)return null;
  const h=rows[hr].map(x=>x.toLowerCase().trim());

  function fc(tests){
    for(const t of tests){
      const i=h.findIndex(x=>t(x));
      if(i>=0)return i;
    }
    return -1;
  }

  const repCol =fc([x=>/^rep$/.test(x),x=>/^agent$/.test(x),x=>x.includes("rep"),x=>x.includes("agent")]);
  const appCol =fc([x=>/^approved$/.test(x),x=>x.includes("approved")&&!x.includes("%")&&!x.includes("point")]);
  const condCol=fc([x=>/^conditional$/.test(x),x=>x.includes("conditional")]);
  const pendCol=fc([x=>/^pending$/.test(x),x=>x.includes("pending")&&!x.includes("%")&&!x.includes("point")]);
  const nomCol =fc([x=>x.includes("nominal")&&!x.includes("point"),x=>x.includes("nominal")]);
  const pacCol =fc([x=>x.includes("%")&&x.includes("goal")&&x.includes("approved")]);
  const ppcCol =fc([x=>x.includes("%")&&x.includes("goal")&&x.includes("pending")]);

  const data={};
  for(let i=hr+1;i<rows.length;i++){
    const r=rows[i];
    const name=(r[repCol]||"").trim();
    if(!name||/train|total|team|^d-/i.test(name))continue;
    const app =appCol >=0?num(r[appCol]):0;
    const cond=condCol>=0?num(r[condCol]):0;
    const pend=pendCol>=0?num(r[pendCol]):0;
    const nom =nomCol >=0?num(r[nomCol]):0;
    const pA  =pacCol >=0?pct(r[pacCol]):0;
    const pP  =ppcCol >=0?pct(r[ppcCol]):0;
    const ts  =app+cond+pend;
    if(nom===0&&ts===0)continue;
    data[name]={name,nom,pctA:pA,pctP:pP,ts,cvps:ts>0?nom/ts:0};
  }
  return Object.keys(data).length?data:null;
}

function card(cls,medal,name,stat,runners,ck){
  const mx=runners.length?runners[0].val:1;
  let h=`<div class="card ${cls}">
    <div class="medal">${medal}</div>
    <div class="winner-name ${ck}-n">${name}</div>
    <div class="winner-stat ${ck}-s">${stat}</div>
    <div class="divider ${ck}-d"></div>`;
  runners.slice(0,3).forEach((r,i)=>{
    const pw=Math.max(4,Math.round((r.val/mx)*100));
    h+=`<div class="runner">
      <div class="r-rank ${ck}-rn">${i+2}</div>
      <div class="r-av ${ck}-av">${ini(r.name)}</div>
      <div class="r-info">
        <div class="r-top">
          <span class="r-name ${ck}-rname">${r.name}</span>
          <span class="r-stat ${ck}-rs">${r.stat}</span>
        </div>
        <div class="bar-bg ${ck}-bb"><div class="bar-fill ${ck}-bf" style="width:${pw}%"></div></div>
      </div>
    </div>`;
  });
  return h+`</div>`;
}

function render(now,prev){
  const arr=Object.values(now);
  const byCv   =[...arr].filter(d=>d.nom>0).sort((a,b)=>b.nom-a.nom);
  const byGoalA=[...arr].filter(d=>d.pctA>0).sort((a,b)=>b.pctA-a.pctA);
  const byGoalP=[...arr].filter(d=>d.pctP>0).sort((a,b)=>b.pctP-a.pctP);
  const byCps  =[...arr].filter(d=>d.cvps>0).sort((a,b)=>b.cvps-a.cvps);

  let html=`<div class="grid">`;

  if(byCv.length)
    html+=card("card-cv","🏆",byCv[0].name,`$${Math.round(byCv[0].nom).toLocaleString()}`,
      byCv.slice(1).map(d=>({name:d.name,val:d.nom,stat:`$${Math.round(d.nom).toLocaleString()}`})),"cv");

  if(byGoalA.length&&byGoalP.length){
    html+=`<div class="card card-goal">`;
    [[byGoalA,"🎯","Approved"],[byGoalP,"⏳","Pending"]].forEach(([a,em,label],li)=>{
      const top=a[0];if(!top)return;
      html+=`<div class="goal-sub">${label}</div>
        <div class="medal" style="font-size:22px;margin-bottom:4px;">${em}</div>
        <div class="winner-name goal-n" style="font-size:16px;">${top.name}</div>
        <div class="winner-stat goal-s" style="margin-bottom:8px;">${top.val.toFixed(1)}%</div>`;
      if(li===0){
        html+=`<div class="divider goal-d" style="margin-bottom:8px;"></div>`;
        a.slice(1,3).forEach((r,i)=>{
          const pw=Math.max(4,Math.round((r.val/a[0].val)*100));
          html+=`<div class="runner">
            <div class="r-rank goal-rn">${i+2}</div>
            <div class="r-av goal-av">${ini(r.name)}</div>
            <div class="r-info">
              <div class="r-top"><span class="r-name goal-rname">${r.name}</span><span class="r-stat goal-rs">${r.val.toFixed(1)}%</span></div>
              <div class="bar-bg goal-bb"><div class="bar-fill goal-bf" style="width:${pw}%"></div></div>
            </div>
          </div>`;
        });
      }
    });
    html+=`</div>`;
  } else if(byGoalA.length||byGoalP.length){
    const a=byGoalA.length?byGoalA:byGoalP;
    html+=card("card-goal","🎯",a[0].name,`${a[0].val.toFixed(1)}%`,
      a.slice(1).map(d=>({name:d.name,val:d.pctA||d.pctP,stat:`${(d.pctA||d.pctP).toFixed(1)}%`})),"goal");
  }

  if(byCps.length)
    html+=card("card-cps","💰",byCps[0].name,`$${Math.round(byCps[0].cvps)} / sale`,
      byCps.slice(1).map(d=>({name:d.name,val:d.cvps,stat:`$${Math.round(d.cvps)}`})),"cps");

  if(prev){
    const diffs=arr.map(n=>{
      const p=prev[n.name];
      if(!p||p.nom<=0)return null;
      const delta=((n.nom-p.nom)/p.nom)*100;
      return{name:n.name,delta,val:Math.max(0,delta)};
    }).filter(Boolean).sort((a,b)=>b.delta-a.delta);
    if(diffs.length)
      html+=card("card-imp","📈",diffs[0].name,`+${diffs[0].delta.toFixed(1)}% vs last period`,
        diffs.slice(1).map(d=>({name:d.name,val:Math.max(0,d.delta),stat:d.delta>=0?`+${d.delta.toFixed(1)}%`:`${d.delta.toFixed(1)}%`})),"imp");
  }

  html+=`</div>`;
  document.getElementById("content").innerHTML=html;
}

async function load(){
  document.getElementById("content").innerHTML='<div class="loading">Loading standings...</div>';
  try{
    const [r1,r2]=await Promise.allSettled([fetch(csvURL(GID_NOW)),fetch(csvURL(GID_PREV))]);
    if(r1.status!=="fulfilled"||!r1.value.ok) throw new Error("Could not fetch current period sheet");
    const t1=await r1.value.text();
    const t2=(r2.status==="fulfilled"&&r2.value.ok)?await r2.value.text():null;
    const now=parseSheet(t1);
    if(!now)throw new Error("Could not read data — check column headers in Points 6.15");
    const prev=t2?parseSheet(t2):null;
    render(now,prev);
  }catch(e){
    document.getElementById("content").innerHTML=`<div class="error"><strong>Error:</strong> ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
